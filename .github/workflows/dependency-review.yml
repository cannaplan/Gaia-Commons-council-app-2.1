name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high and critical severity vulnerabilities
          fail-on-severity: high
          # Also flag licenses that are incompatible with MIT
          deny-licenses: AGPL-3.0-only, GPL-3.0-only
          comment-summary-in-pr: always
          # Allow GitHub Actions whose license metadata isn't published to npm
          allow-dependencies-licenses: >-
            pkg:githubactions/actions/checkout,
            pkg:githubactions/actions/dependency-review-action,
            pkg:githubactions/actions/setup-node,
            pkg:githubactions/actions/upload-artifact,
            pkg:githubactions/actions/download-artifact,
            pkg:githubactions/github/codeql-action
