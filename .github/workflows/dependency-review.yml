name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high and critical severity vulnerabilities
          fail-on-severity: high

          # Only comment when the job fails (keeps PRs quiet when everything is OK)
          comment-summary-in-pr: on-failure

          # TODO: License enforcement:
          # The previous `deny-licenses` input is deprecated.
          # If you need license policy enforcement, use a dedicated license-check workflow/tool,
          # or switch to an allowlist input if/when supported by this action version.

          # Allow GitHub Actions whose license metadata isn't published to npm
          allow-dependencies-licenses: >-
            pkg:githubactions/actions/checkout,
            pkg:githubactions/actions/dependency-review-action,
            pkg:githubactions/actions/setup-node,
            pkg:githubactions/actions/upload-artifact,
            pkg:githubactions/actions/download-artifact,
            pkg:githubactions/github/codeql-action
