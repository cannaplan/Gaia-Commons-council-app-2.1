version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Group minor/patch updates for Radix UI to reduce PR noise
      radix-ui:
        patterns:
          - '@radix-ui/*'
        update-types:
          - minor
          - patch
      # Group test-related dependency updates
      testing:
        patterns:
          - '@testing-library/*'
          - vitest
          - jsdom
          - supertest
        update-types:
          - minor
          - patch
      # Group type definition updates
      types:
        patterns:
          - '@types/*'
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
